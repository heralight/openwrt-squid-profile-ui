name: OpenWrt 25 APK package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      sdk_image:
        description: OpenWrt SDK container image
        required: true
        default: openwrt/sdk:mediatek-mt7622-main

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      SDK_IMAGE: ${{ inputs.sdk_image || 'openwrt/sdk:mediatek-mt7622-main' }}
      PACKAGE_NAME: luci-app-squid-profiles
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package with OpenWrt SDK container
        run: |
          set -eu
          mkdir -p artifacts sdk-bin
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work:ro" \
            -v "${GITHUB_WORKSPACE}/sdk-bin:/builder/bin" \
            -e PACKAGE_NAME="${PACKAGE_NAME}" \
            "${SDK_IMAGE}" \
            sh -euxc '
              [ ! -d ./scripts ] && ./setup.sh
              mkdir -p package/feeds/custom
              cp -a /work/openwrt-squid-profile-ui "package/feeds/custom/${PACKAGE_NAME}"
              ./scripts/feeds update -a
              ./scripts/feeds install "${PACKAGE_NAME}"
              make defconfig
              make "package/${PACKAGE_NAME}/check" V=s
              make "package/${PACKAGE_NAME}/clean" V=s
              make "package/${PACKAGE_NAME}/compile" V=s -j"$(nproc)"
              make package/index V=s
            '

      - name: Collect APK artifacts
        run: |
          set -eu
          mkdir -p artifacts/packages artifacts/repository
          find sdk-bin/packages -type f -name '*.apk' -print -exec cp -v {} artifacts/packages/ \;
          find sdk-bin/packages -type f \( -name 'packages.adb' -o -name 'packages.adb.sig' -o -name 'APKINDEX.tar.gz' -o -name 'APKINDEX.tar.gz.sig' \) -print -exec cp -v {} artifacts/repository/ \; || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25-apk-packages
          path: artifacts
