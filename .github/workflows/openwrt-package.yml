name: OpenWrt 25 APK package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      ARCH: aarch64_cortex-a53
      PACKAGE_NAME: luci-app-squid-profiles
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build package with OpenWrt SDK action
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ env.ARCH }}
          FEED_DIR: ${{ github.workspace }}
          FEEDNAME: custom
          INDEX: 1
          PACKAGES: ${{ env.PACKAGE_NAME }}

      - name: Collect APK artifacts
        run: |
          set -eu
          mkdir -p artifacts/packages artifacts/repository
          find bin/packages -type f -name '*.apk' -print -exec cp -v {} artifacts/packages/ \;
          find bin/packages -type f \( -name 'packages.adb' -o -name 'packages.adb.sig' -o -name 'APKINDEX.tar.gz' -o -name 'APKINDEX.tar.gz.sig' \) -print -exec cp -v {} artifacts/repository/ \; || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25-apk-packages
          path: artifacts

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/packages/**/*.apk
            bin/packages/**/packages.adb
            bin/packages/**/packages.adb.sig
            bin/packages/**/APKINDEX.tar.gz
            bin/packages/**/APKINDEX.tar.gz.sig
