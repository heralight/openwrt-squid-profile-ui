
services:
  openwrt:
    build:
      context: .
      dockerfile: Dockerfile
    #container_name: openwrt-squid-test
    #privileged: true
    # Exposez l'interface LuCI (80), SSH (22) et Squid (3128) sur l'hôte
    ports:
      - "8080:80"
      - "2222:22"
      - "3128:3128"
    # Montez un volume pour la persistance de la configuration et des domaines squid
    volumes:
      # Conservez la configuration OpenWrt (/overlay) entre les redémarrages
      - ./overlay:/overlay
      # Conservez les domaines et les maps de Squid générés par le plugin
      - ./squid_domains:/etc/squid/domains
      - ./squid_maps:/etc/squid/maps